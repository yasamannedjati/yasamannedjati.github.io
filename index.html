  <script>
    const events = [
      { type: "text", value: "Academic Project / Master's Thesis / Politecnico di Milano / Individual Project / Spring 2025 / Milan, Italy Supervisors: Frank clementi" },
      { type: "text", value: "Taking half a step back from the crowd, one can enter new zones of quiet that lie alongside but separate from all that is happening in the outside world. As if one is outside in mind but inside in space, maintaining a relationship with the external world while still retaining a sense of personal space. Here, there is pleasure in the solitude that comes from being alone yet surrounded, allowing the external world to be observed without the pressure to engage, remaining adjacent, in another layer. Space is filled with both physical and metaphysical liminalities. Light, sound, walls, and trees can all create layers within a space. The visibility of these divisions between layers can vary, from firm, like walls or doors, to more fluid boundaries, such as noise or shadows. Within these layers, the roles of the observer and the observed can interchange, as if we are always simultaneously onstage and offstage, with the definition of the stage shaped by the point of view. We are almost always being seen while observing." },
      { type: "image", value: "1.png" },
      { type: "text", value: "the primary stage shifts to the intermediate space in front of the curtain during the course of the knee play I" },
      { type: "text", value: "Theatre has long separated the staged from the unstaged, the space of performance from the world that exists around it. Yet, what lies just beyond the frame, just outside the spectacle, carries its own significance. This thesis explores the offstage, not as absence, but as an active space, a liminal condition where presence is redefined and solitude unfolds adjacent to the crowd. The fundamental question driving this thesis is: What do urban spaces offer to individuals who wish to spend time on their own, not indoors, but within the public? At the core of this exploration is the concept of adjacent solitude, being alone, yet not isolated; present, yet not participating. We’re looking for spaces where one can exist alongside others without the pressure of engagement. And finding them in spaces that resist singular definition. Which is where the notionof liminality further complicates this condition, emphasizing transitional states, blurred boundaries, spaces without fixed meaning, where one can have a quiet, personal negotiation with the public realm. Knee Plays, borrowing their name from Einstein on the Beach by Robert Wilson and Philip Glass, function as interludes between acts, with the term ‘knee’ referring to the way human knees act as joints, connecting separate movements into a continuous flow. In the original production, the Knee Plays were shorter, recurring moments that provided the necessary time to change the scenery while also maintaining continuity between acts. As the primary stage shifted, focus moved to an intermediate space in front of the curtain, another liminal zone. In spatial terms, these moments of in-betweenness parallel the kinds of urban spaces that exist at the edges of activity, places that are neither fully engaged nor entirely apart, but instead function as transitional zones. Just as Knee Plays restructure the rhythm of a performance, these spaces shape how solitude is experienced in public, providing an alternative mode of being, present, yet at a distance. Through different chapters, the experience of being ‘offstage’ in the city is explored: on being; examines how one can exist in public with minimal contact, present but unengaged, outside in mind, inside in space. on observing; focuses on the interchangeable roles of observor and observed, looking at how spatial conditions mediate spectatorship. on narrative; considers how architectural works can engage in a dialogue to construct fragmented narratives. on space; explores the spatial qualities on ine-betweenness and unclaimed spaces. on perception; addresses how spatial experience is shaped by point of view, and the act of seeing itself. Between the main sections of this thesis, transitional chapters function as Knee Plays. Rather than ntroducing entirely new discussions, these chapters act as joints that bridge themes." },
      { type: "text", value: "MEDITATION VS. ACTION framing the play" },
      { type: "image", value: "2.png" },
      { type: "text", value: "negating interaction soliciting interaction" },
      { type: "image", value: "3.png" },
      { type: "text", value: "not inward, not outward, but toward" },
      { type: "image", value: "4.png" },
      { type: "image", value: "5.png" },
      { type: "text", value: "In a gallery, people looking at art can become part of what’s being seen. The onlooker watches not just the works but also the way people move through them, how they pause, how they react." },
      { type: "image", value: "6.png" },
      { type: "text", value: "OBSERVANT / OBSERVED voyeurism in Edward Hopper’s work" },
      { type: "text", value: "Populated by people alone, or in uneasy, uncommunicative groupings of twos and threes, fastened into poses that seem indicative of distress, Hopper’s paintings show a layering of subjects and spectators. The figures exhibit a sense of unease at being seen or looked over through windows, streets, or other architectural elements that produce the spatial sensation of being close but separated from other people. This view, often characterized as voyeuristic, replicates one of the primary feelings of loneliness: the combination of a sense of near-unbearable exposure with a sense of isolation, of being walled off or confined. In his paintings, the voyeurs expand beyond the actual painting to us, the audience, giving us the impression that we are gazing in to view a scene that is not meant to be seen. Voyeurism works to isolate the viewer as well as the viewed. He declares barriers and boundaries, wanted things at a distance and unwanted things too close, and an erotics of insufficient intimacy in his paintings. Hopper uses strange perspectives and sites of blockage and exposure to combat the insularity of loneliness, forcing the viewer to enter imaginatively into an experience that is otherwise notable for its profound impenetrability, its multiple barriers, its walls like windows, its windows like walls. The color green powerfully communicates urban alienation and the atomization of human beings." },
      { type: "image", value: "7.png" },
      { type: "text", value: "layered deconstruction of edward hopper’s morning in a city" },
      { type: "image", value: "8.png" },
      { type: "text", value: "layered deconstruction of edward hopper’s nighthawks" },
      { type: "image", value: "9.png" },
      { type: "text", value: "layered deconstruction of edward hopper’s night windows" },
      { type: "image", value: "10.png" },
      { type: "text", value: "layered deconstruction of edward hopper’s hotel window" },
      { type: "image", value: "11.png" },
      { type: "text", value: "layered deconstruction of edward hopper’s new york cinema" },
      { type: "image", value: "12.jpg" },
      { type: "image", value: "13.jpg" },
      { type: "text", value: "physical models of the layered deconstruction of edward hopper's paintings" },
      { type: "text", value: "IN THE FRAME OF CONFINEMENT the bridge of sighs and the reversed spectacle of observation" },
      { type: "image", value: "14.png" },
      { type: "text", value: "As prisoners took their last glimpse of freedom before confinement, their view framed by the bridge’s openings, they were simultaneously staged as subjects to be observed in a reversed spectacle where passersby become the audience. The passage itself becomes performance, turning the act of looking into an asymmetrical exchange." },
      { type: "text", value: "EXCHANGING WITH THE WHITE NOISE liminality and its materiality in space" },
      { type: "image", value: "15.jpg" },
      { type: "text", value: "background sound, like a TV show you’ve watched countless times, can create a subtle, almost invisible yet distinct layer of spatial experience. While you remain aware of the sound, it becomes a form of white noise, present in the background of your activities, not demanding active attention, but not entirely ignored either. Despite its peripheral presence, you still give and receive from it, creating an ongoing reciprocal interaction with the environment. It offers a sense of continuity, anchoring you in the spaces while letting the mind drift, much like the steady hum of a city outside an open window. There is an almost invisible exchange between the individual and these layers of ambient sound that seeps into awareness, filling the space without making it feel crowded." },
      { type: "text", value: "SPOTTING PLEASURABLE ALONE-NESS IN MASS PRESENCE a study of adjacent solitude in public places through words and images" },
      { type: "text", value: "The adjacent solitude in question carries within it the notion of unfolding in a different layer. It exists in the space between the stage and the audience, where the knee play happens, acting as an invisible barrier that separates you from the outside world and creates room for simply being, even if only slightly distanced, among others. It’s a place with a sense of boundary, but no real division. This solitude happens in a space shaped by various physical features, layers, and transitional spots. Following a few images and descriptions of these areas from various individuals, a few examples are studied to demonstrate how the layering is either purposefully or inadvertently placed in these areas to describe that non-literal zone where people can feel at ease in a public situation." },
      { type: "text", value: "Describe a public space or a place in the city where you felt at ease being alone, even in the presence of a crowd, without feeling isolated or detached." },
      { type: "image", value: "16.jpg" },
      { type: "text", value: "KIMIA, 26 Two years ago in Lund’s city center, by the ice skating rink near a massive Christmas tree, its lights soon to be switched on. It was a weekend night, and the place was packed with poeple all busy with their own activities. Every corner was buzzing with movement and sound. I enjoyed sitting on the wooden benches, people-watching as everyone engaged in fun activities around me. Going alone to the cinema, feels like being part of something bigger, a crowd of strangers drawn together by a shared love for the movie. Though we don’t know each other, we are united in the experience, laughing, tearing up, and celebrating each moment as it unfolds on screen. It’s a simple but powerful feeling of connection through a common purpose." },
      { type: "text", value: "ZAHRA, 27 Coming back from work, especially on weekends, I often feel isolated. Everyone around is loud, laughing, enjoying themselves, which only heightens that feeling. I tend to prefer quieter, open spaces, like a gallery where I can sit and watch people silently engaging with art, or a bench by the canal where I can watch kids play or take in small, beautiful scenes. When people are having fun in semi-public spaces, like bars spilling onto the street, it feels even more isolating. They’re visible but separate, with an unspoken boundary. In fully public spaces, though, that boundary dissolves; seeing someone seated in a park, you could sit nearby and feel like you’re sharing the same space. In contrast, in private, chic galleries, if you don’t feel welcome or comfortable joining in, it can deepen that sense of being alone. For some, especially introverts, that invisible border can feel like a real hurdle." },
      { type: "image", value: "17.jpg" },
      { type: "image", value: "18.jpg" },
      { type: "text", value: "RONAK, 29 In galleries with seating, I enjoy viewing the artworks on my own first, then sitting for as long as I can to observe people’s reactions to them. In bookstores, I like finding a quiet spot to read away from the crowd, a habit I don’t have anywhere else." },
      { type: "text", value: "MARYAM, 63 Maybe the park counts; it’s a place where you can have solitude, even with people around. Other than that, I can’t really think of another spot." },
      { type: "image", value: "19.PNG" },
      { type: "image", value: "20.jpg" },
      { type: "text", value: "SAJJAD, 26 Each of these places has a story for me, it’s not just the space itself, but the memories tied to it. In Iran, there was a workspace where my friend worked, and I’d go there after my own job to wait for her. I’d sit with a coffee, watching people work in those quiet moments when I had nothing else to do. It was a workshop with a café upstairs, and just sitting there observing felt oddly relaxing. In Oman, it was different. That trip was my first time abroad, and one night we sat in a bar with friends. It was the first time I’d ever felt completely at ease, with no worries. I was there on an internship, everything was organized, and it all just flowed, no concerns, just that feeling of everything going right. Then there was a small pizza place I found while waiting to kill some time. The owner was incredibly friendly, welcoming people, even taking pictures with them. I stayed there because it was interesting and felt safe, watching him make pizzas and seeing the young crowd coming in. It was a simple place, but it had a warm, fun vibe." },
      { type: "text", value: "REZA, 26 don’t usually feel comfortable in public spaces and only find privacy in places that feel more secluded. It’s not easy for me to feel safe around people or in open areas. I felt comfortable sitting on my own to work in some of Tehran’s cafes. In Hamburg, though, there was a Vietnamese restaurant I often went to for lunch. It was relatively big, with an upper floor, but I always sat at a small two-person table by the ground-floor window. It felt like my own little spot where I could put on my headphones, look outside, and feel alone, regardless of how crowded the place was. In Hamburg’s Stadtpark, a huge city park, I’d go alone on nice summer days and sit on the grass. There was enough space to find a quiet spot by a tree and feel separated from everyone else. And in the R.S.O. techno club in Berlin, there were cozy corners with sofas where I could talk with friends without being disturbed by people or loud music. It felt private, just the two of us. I imagine that even if I went alone, I’d be able to go there, sit, and get some peace if I ever felt overwhelmed." },
      { type: "image", value: "21.jpg" },
      { type: "image", value: "22.jpg" },
      { type: "text", value: "FARANK, 33 often sit in cafés—not just any, but the ones where other people are alone too. I like the benches around the city theatre park for people-watching, and I also enjoy spending time in Laleh Park, where I can sit back and take in the surroundings. Also in Shahrdari Square in Rasht, everyone sits around the square, talking together, whether they know each other or not. There are people singing, and it creates a really friendly vibe." },
      { type: "text", value: "MEHDI, 66 In my opinion, the ideal space could be a museum, an art gallery, or a historical exhibition, where, even though you’re among people, you can still be in your own solitude, engaging in something you enjoy that brings peace and pleasure in a public urban environment. Other ideal spaces could be a city park, a theater, a cinema, or visiting historical sites." },
      { type: "image", value: "23.jpg" },
      { type: "image", value: "24.jpg" },
      { type: "text", value: "MADI, 28 Central city squares with benches or somewhere to sit. Then there are the cozier, tucked-away spots. These smaller spaces can feel less secure at night, but with some lighting and seating, they’d be inviting, especially for a quick smoke. A long corridor between buildings, opening to an empty back area. I enjoy people-watching or simply sitting in front of a nice view. Ideally, I’d like it if there was a bench with a transparent cover around it; something that keeps out the cold or rain without blocking the view." },
      { type: "text", value: "AHMAD, 27 The first place that comes to mind is the swimming pool—I’ve always felt something unusual about it, but I think it’s this sense of calm. There’s a stillness there, especially when I’m leaning against a corner, or even sitting quietly in the jacuzzi or sauna. I can watch people without anyone minding me, and it’s really calming." },
      { type: "image", value: "25.jpg" },
      { type: "image", value: "26.png" },
      { type: "text", value: "MARIA, 24 immediately thought of the movies. Places like cinemas, libraries, and viewpoints let me be alone without feeling lonely. Coffee shops and bookstores too, but it depends on my mindset, sometimes they feel comforting, other times, seeing people with company makes me feel lonelier." },
      { type: "text", value: "SAHAR, 26 Sitting on a bench next to a tree, you don’t feel like people are watching you. Everyone is just passing by, running, walking their dogs, or biking. You can sit in peace, looking out from the top of what was once the city’s wall, watching the sunset without the pressure of being watched." },
      { type: "image", value: "27.jpeg" },
      { type: "image", value: "28.jpg" },
      { type: "text", value: "PROJECT SITES" },
      { type: "text", value: "This project unfolds across five cities; Venice, Milan, Brussels, Berlin, and Tehran, each selected for its capacity, or lack thereof, to accommodate an individual onlooker’s presence. Each site is examined through its layers within the urban landscape and the ways in which it interacts with them." },
      { type: "image", value: "29.jpg" },
      { type: "text", value: "THE PRE-SHOW nine settings, three cities" },
      { type: "text", value: "Nine settings have been designed across three of the selected cities; Venice, Milan, and Brussels, each with three distinct placements. All five cities; Venice, Milan, Brussels, Berlin, and Tehran—have been studied and analyzed for their spatial and observational qualities, but the interventions focus on three. Berlin and Tehran remain as essential points of reference, informing the broader exploration of liminality and the act of looking within the urban landscape." },
      { type: "image", value: "30.jpg" },
      { type: "text", value: "VENICE" },
      { type: "image", value: "31.png" },
      { type: "text", value: "To understand the liminality of Venice, one cannot overlook water, the defining element that has shaped the city’s very surface. Venice responds only as much as necessary to the immediate conditions it faces, remaining closely tied to its surface. When water levels rise, the city adapts just enough, with acqua alta temporarily lifting daily life above the tide. Venice is constantly shifting between land and water. Narrow streets (calli) and bridges frame the water, creating passages that define the city’s horizontal layers. Canals thread through these layers, while campos, the small city squares, act as open rooms within them." },
      { type: "text", value: "Where does an onlooker settle in Venice? The edges of canals, where one can sit on stone ledges or lean against iron railings, watching gondolas slip by. Bridges, providing a sense of hovering above water Even at ground level, benches at the margins of campos, allowing one to settle, facing either the movement of people or gondolas on water. Unlike cities where one can step back to gain an overview, Venice demands observation from within." },
      { type: "image", value: "32.png" },
      { type: "text", value: "venice constantly shifting between land and water" },
      { type: "image", value: "33.png" },
      { type: "text", value: "venice responding to its surface conditions by adapting precisely to the shifting water levels" },
      { type: "text", value: "Piazza San Marco, one of Venice’s most visited sites and home to Basilica San Marco, the Campanile, Palazzo Ducale, and other monumental buildings, draws crowds year-round to its vast open space. Framed by its surrounding architecture, the square becomes a stage for constant movement—visitors entering the basilica, lingering in the piazza, walking beneath the arches of the colonnades, or making their way to and from the water." },
      { type: "image", value: "34.png" },
      { type: "image", value: "35.JPG" },
      { type: "image", value: "36.jpg" },
      { type: "text", value: "MILAN" },
      { type: "image", value: "37.png" },
      { type: "text", value: "Looking forward while maintaining a conversation with its past, Milan is where the modern and the historical coexist in a continuous dialogue. This duality is embeded in its architecture: sleek glass towers rise through the shorter, older fabric of the city, creating a vertical juxtaposition of time and layering its temporality. Events like Design Week and Fashion Week reinforce a sense of cyclical reinvention, where the city is continually reshaped. Yet beyond its outward transformations, Milan holds invisible layers within seen in the courtyards houses (case di ringhiera) that are tucked away behind street facades, in contrast to the outward facing vertical landmarks." },
      { type: "text", value: "Where does an onlooker settle in milan? Observation in Milan happens at multiple levels. Benches in piazzas and small parks provide resting points for people-watching. Stairs at historic sites frame perspectives, offering structured viewpoints. Elevated vantage points, like the Galleria, allow for a layered view of the city, where its historical and modern elements stack upon one another." },
      { type: "image", value: "38.png" },
      { type: "text", value: "case ringhiera: looking in / towers: looking out" },
      { type: "image", value: "39.png" },
      { type: "text", value: "modern and historical coexisting in milan" },
      { type: "text", value: "Within the walls of Castello Sforzesco, the Cortile delle Armi forms an open-air urban stage, welcoming both castle visitors and passersby as they move through or pause within its enclosure." },
      { type: "image", value: "40.png" },
      { type: "image", value: "41.jpg" },
      { type: "image", value: "42.jpg" },
      { type: "text", value: "BRUSSELS" },
      { type: "image", value: "43.png" },
      { type: "text", value: "city of both physical and cultural transitions, Brussels’ topography creates a natural layering, where streets shift in elevation, offering multiple vantage points across the urban fabric. This physical layering mirrors the city’s linguistic divisions, with neighborhoods transitioning from French-speaking to Dutch-speaking, sometimes fluidly, sometimes with visible tension, interwoven with the city’s international character as the home of the European Union. Brussels also negotiates between modernity and history. The Grand Place remains a centerpiece of the city’s past, while contemporary developments push outward. Meanwhile, the city’s Art Nouveau heritage, adds another layer to the dialogue." },
      { type: "text", value: "Where does an onlooker settle in Brussels? Observation in Brussels happens from its terraced transitions, where shifting elevations reveal different layers of the city. Parks scattered across neighborhoods offering resting points." },
      { type: "image", value: "44.png" },
      { type: "text", value: "spoken languages in brussels" },
      { type: "image", value: "45.png" },
      { type: "text", value: "grand place enclosing the square like a stage" },
      { type: "text", value: "Grand Place frames the square like a stage, constantly filled with a large crowd as one of Brussels’ main tourist sites. It offers no place for pause, people move through it, observing everything around them as an audience, while the surrounding buildings stand as a second audience, watching over the scene." },
      { type: "image", value: "46.png" },
      { type: "image", value: "47.png" },
      { type: "image", value: "48.jpg" },
      { type: "text", value: "BERLIN" },
      { type: "image", value: "49.png" },
      { type: "text", value: "The memory of division is inscribed in Berlin’s urban fabric, evident in the contrast between eastern and western blocks, while the Spree River acts as both a connector and a divider. This layered history coexists with a contemporary city that has reinvented itself as a hub for culture, nightlife, and alternative spaces. Berlin is a city without a singular center, instead forming a constellation of neighborhoods, each carrying its own layered identity. The techno scene, rooted in the city’s post-reunification era, thrives in repurposed industrial spaces. Abandoned sites become cultural hubs, and historical structures take on new meanings, reflecting the city’s continuous reinvention." },
      { type: "text", value: "Where does an onlooker settle in Berlin? Observation in Berlin is tied to movement, one does not settle in a single spot but experiences the city through shifting perspectives. Elevated platforms, whether on U-Bahn stations or repurposed industrial rooftops, provide vantage points over a fragmented cityscape. Parks, particularly Tempelhofer Feld, offer a vast open space for observation." },
      { type: "image", value: "50.png" },
      { type: "text", value: "the berlin wall dividing the city into two blocks" },
      { type: "text", value: "The Berlin site is located at a break in the Berlin Wall, an open space overlooking the river and the western part of the city and emboding Berlin’s liminality as a threshold. Situated in the city center, it attracts many visitors who gather around, exploring the remnants of the wall." },
      { type: "image", value: "51.png" },
      { type: "image", value: "52.jpg" },
      { type: "image", value: "53.png" },
      { type: "text", value: "TEHRAN" },
      { type: "image", value: "54.png" },
      { type: "text", value: "Tehran’s liminality is rooted in contrasts, between the private and the public, the visible and the hidden. Small alleys open abruptly onto highways, shifting the city’s scale and rhythm in unexpected ways. Its architecture is defined by controlled visibility, revealing fragments without full exposure, maintaining a careful negotiation between interior and exterior. The city’s stratification is also physical. Tehran’s topography plays a crucial role in how one experiences it. The northern districts sit at a higher elevation, offering a literal view over the rest of the city, while lower areas remain more densely woven. These differences shape not only the visual landscape but also the socio-economic divisions within the city." },
      { type: "text", value: "Where does an onlooker settle in Tehran? In Tehran, the act of looking is often filtered, through trees framing the streets, through the gaps between buildings, or from the vantage points of pedestrian bridges. Steps in front of buildings become informal gathering points, while benches in parks or along streets allow for quiet observation of the city’s movement. The onlooker in Tehran does not simply watch; rather, they navigate between moments of openness and enclosure, between the city’s outward energy and its quieter internal spaces." },

    const smallImages = new Set([
      "1.png",

      "3.png",
      "14.png"
    ]);

    const story = document.getElementById("story");

    const classifyText = (value, index) => {
      if (headings.has(value)) return "heading";
      if (subheadings.includes(value)) return "subheading";
      if ([...headings].some((heading) => value.startsWith(heading + " ") && value.length < heading.length + 60)) return "heading";
      if (index > 0 && events[index - 1].type === "image" && value.length < 150) return "caption";
      return "";
    };

    events.forEach((event, index) => {
      if (event.type === "text") {
        const block = document.createElement("div");
        const paragraph = document.createElement("p");
        block.className = ("text-block " + classifyText(event.value, index)).trim();
        paragraph.textContent = event.value;
        block.append(paragraph);
        story.append(block);
        return;
      }

      const figure = document.createElement("figure");
      const image = document.createElement("img");
      const caption = document.createElement("figcaption");
      figure.className = "image-block";
      if (fullImages.has(event.value)) {
        figure.classList.add("full");
      } else if (smallImages.has(event.value)) {
        figure.classList.add("small");
      }
      figure.dataset.image = event.value;
      image.src = "images/offstage/gallery/" + event.value;
      image.alt = "offstage image " + event.value.replace(/\..+$/, "");
      image.loading = "lazy";
      image.decoding = "async";
      caption.textContent = event.value;
      figure.append(image, caption);
      story.append(figure);

      image.addEventListener("load", () => {
        const ratio = image.naturalWidth / image.naturalHeight;
        if (!fullImages.has(event.value) && !smallImages.has(event.value) && ratio < 0.75) {
          figure.classList.add("narrow");
        }
      });
    });
