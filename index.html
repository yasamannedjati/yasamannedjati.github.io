<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>Yasaman Nedjati</title>

  <meta name="description"

    :root {
      --background: #050505;
      --foreground: #f4f2ee;
      --muted: #f4f2ee;
      --line: rgba(244, 242, 238, 0.22);
      --panel: #11100f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: "HK Grotesk", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.35;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      color: var(--muted);
    }

    .site-title {
      margin: 28px 28px 8px 20px;
      font-size: clamp(42px, 6.2vw, 86px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: 0;
      text-align: left;
    }

    nav {
      position: fixed;
      right: 28px;
      bottom: 24px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 18px;
    }

    nav a {
      display: inline-flex;
      min-width: 44px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
    }

    nav a:last-child {
      font-size: inherit;
      line-height: 1;
    }

    main {
      min-height: 100vh;
      padding: 0 28px 72px 20px;
    }

    .intro {
      width: min(520px, calc(100vw - 40px));
      margin: 0 0 76px;
      color: var(--muted);
      font-size: 18px;
    }

    .projects {
      width: min(62vw, 820px);
      max-width: 100%;
